<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>설날 새뱃돈 대작전</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #page-wrap {
      width: 750px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
    }

    #flash-container {
      width: 500px;
      height: 400px;
      background: #000;
    }

    ruffle-player {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      autoplay: "on",
      unmuteOverlay: "hidden",
      warnOnUnsupportedContent: false,
      allowScriptAccess: true
    };
  </script>

  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>

<body>
  <div id="page-wrap">
    <div id="flash-container"></div>
  </div>

  <script>
    window.addEventListener("load", async function () {
      const container = document.getElementById("flash-container");

      try {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();

        player.style.width = "500px";
        player.style.height = "400px";

        container.innerHTML = "";
        container.appendChild(player);

        await player.load({
          url: "./sulnalbigjacjun.swf",
          allowScriptAccess: true
        });

        console.log("SWF loaded successfully");
      } catch (error) {
        console.error("Ruffle load failed:", error);
        container.innerHTML =
          '<div style="color:white; padding:20px; font-family:sans-serif;">SWF 로드 실패: 콘솔을 확인해주세요.</div>';
      }
    });
  </script>
</body>
</html>
