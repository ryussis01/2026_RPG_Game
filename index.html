<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>설날 새뱃돈 대작전</title>

  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #game-wrap {
      width: 750px;
      height: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    #game-box {
      width: 500px;
      height: 400px;
      background: #000;
    }

    ruffle-player {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <div id="game-wrap">
    <div id="game-box">
      <ruffle-player
        src="./sulnalbigjacjun.swf"
        autoplay>
      </ruffle-player>
    </div>
  </div>
</body>
</html>
