<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>효짱송 2탄 플래시 엽기송</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #page-wrap {
      width: 550px;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
    }

    #flash-container {
      width: 400px;
      height: 300px;
      background: #66ff00;
      position: relative;
    }

    ruffle-player {
      width: 100%;
      height: 100%;
      display: block;
    }

    #start-screen {
      width: 400px;
      height: 300px;
      background: #ecffd9;
      border: 3px solid #75c943;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
      text-align: center;
    }

    #start-screen h1 {
      font-size: 25px;
      margin: 0 0 12px;
      color: #3b8f1f;
    }

    #start-screen p {
      font-size: 14px;
      margin: 0 0 18px;
      color: #3f5f2f;
      line-height: 1.5;
    }

    #play-button {
      border: 0;
      background: #66bb3a;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(102, 187, 58, 0.35);
    }

    #play-button:hover {
      background: #4fa02a;
    }
  </style>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      autoplay: "on",
      unmuteOverlay: "hidden",
      warnOnUnsupportedContent: false,
      allowScriptAccess: true
    };
  </script>

  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>

<body>
  <div id="page-wrap">
    <div id="flash-container">
      <div id="start-screen">
        <h1>효짱송 2탄</h1>
        <p>버튼을 누르면<br />플래시 엽기송이 재생됩니다.</p>
        <button id="play-button">▶ 재생하기</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("play-button").addEventListener("click", async function () {
      const container = document.getElementById("flash-container");

      try {
        container.innerHTML = "";

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();

        player.style.width = "400px";
        player.style.height = "300px";

        container.appendChild(player);

        await player.load({
          url: "./hyozzang_song_02.swf",
          allowScriptAccess: true
        });

        console.log("Hyozzang Song 02 loaded successfully");
      } catch (error) {
        console.error("Ruffle load failed:", error);
        container.innerHTML =
          '<div style="color:white; padding:20px; font-family:sans-serif;">SWF 로드 실패: 콘솔을 확인해주세요.</div>';
      }
    });
  </script>
</body>
</html>
